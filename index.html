<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervacija prostorov</title>

<style>
/* === OSNOVNI STIL === */
body {
  margin:0;
  font-family:Arial;
  background:#e6f2ff; /* svetlo modra */
}

.container {
  display:flex;
  height:100vh;
}

/* === LEVI MENI === */
.sidebar {
  width:260px;
  background:#1e3a5f;
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.header-title {
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

.room {
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* === DESNI DEL === */
.main {
  flex:1;
  padding:20px;
}

iframe {
  width:100%;
  height:75vh;
  border:none;
}

/* === GUMBI SPODAJ === */
.pdf-btn {
  padding:10px;
  margin-top:10px;
  border:2px dashed #ccc;
  text-align:center;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- ================== LEVI MENI ================== -->
<div class="sidebar">

<div>
<div class="header-title">KRAJEVNA SKUPNOST DEKANI</div>

<!--

<div class="room" style="background:#14b8a6" onclick="setCal('https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Europe%2FBelgrade&showPrint=0&showTabs=0&showCalendars=0&showTz=0&title=OSTALO&src=NTFlM2UzZDA5YmM2ZDQ0NWI2YTA4ZDI2YTk0ZjNmMWM5MWM1MWUxNjRiMzRjYmU5NWJkNzA4YzQwYWRmMmQzNkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=c2wuc2xvdmVuaWFuI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&color=%23c0ca33&color=%230b8043" style="border:solid 1px #777" width="800" height="600" frameborder="0" scrolling="no">')">OSTALO</div>

</div>

<div>
<!-- PDF mora biti v istem repoju kot index.html -->
<div class="pdf-btn" onclick="openPDF()">📄 CENIK</div>
</div>

</div>

<!-- ================== DESNI DEL ================== -->
<div class="main">
<h2>Razpoložljivost prostorov</h2>

<!-- PRIVZETI KOLEDAR -->
<iframe id="cal" src="https://calendar.google.com/calendar/embed?src=db35e4d29553c31dfb9a085abc46d98234f8f3a29017e076f4d1e2a4df323318%40group.calendar.google.com&ctz=Europe%2FBelgrade&mode=MONTH&showTitle=0&showTabs=0&showCalendars=0"></iframe>

</div>

</div>

<script>

// FUNKCIJA ZA MENJAVO KOLEDARJA
function setCal(link){
  document.getElementById("cal").src = link;
}

// ODPRE PDF (cenik.pdf mora obstajati v repoju)
function openPDF(){
  window.open("cenik.pdf","_blank");
}

</script>

</body>
</html>
