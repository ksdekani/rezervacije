<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervacija prostorov</title>
<style>
body{
 margin:0;
 font-family:Arial,sans-serif;
 background:linear-gradient(135deg,#eaf4ff,#dbeafe);
}
.container{display:flex;height:100vh;}
.sidebar{
 width:260px;
 background:linear-gradient(180deg,#1e3a5f,#0f172a);
 color:white;
 padding:20px;
 border-right:3px solid #93c5fd;
 box-shadow:2px 0 10px rgba(0,0,0,.2);
}
.sidebar h2{text-align:center;margin-top:0;}
.room{
 padding:12px;
 margin:10px 0;
 border-radius:12px;
 text-align:center;
 font-weight:bold;
 cursor:pointer;
 box-shadow:0 2px 8px rgba(0,0,0,.2);
 transition:.2s;
}
.room:hover{transform:translateY(-2px);opacity:.9}
.main{flex:1;padding:25px}
iframe{
 width:100%;
 height:80vh;
 border:none;
 border-radius:12px;
 background:white;
 box-shadow:0 4px 15px rgba(0,0,0,.15);
}
</style>
</head>
<body>

<div class="sidebar">
<h2>Prostori</h2>

<!-- Temno modra -->
<div class="room" style="background:#1e40af" onclick="setCal(VELIKA)">VELIKA DVORANA</div>

<!-- Oranžna -->
<div class="room" style="background:#f97316" onclick="setCal(GARAZA)">STARA GARAŽA</div>

<!-- Zelena -->
<div class="room" style="background:#22c55e" onclick="setCal(DOPOLAVOR)">DOPOLAVOR</div>

<!-- Rumena -->
<div class="room" style="background:#eab308;color:black" onclick="setCal(OSTALO)">OSTALO</div>

</div>

<div class="main">
<h2>Razpoložljivost prostorov</h2>

</div>
</div>
