<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervacija prostorov</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #app { display: none; height: 100vh; }

    .container { display: flex; height: 100%; }

    .sidebar { width: 260px; background: #1f2937; color: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }

    .header-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
    }

    .room { padding: 10px; margin: 8px 0; cursor: pointer; border-radius: 6px; font-weight: bold; }
    .room:hover { opacity: 0.85; }

    .pdf-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #374151; }
    .pdf-btn { display: block; text-align: center; padding: 12px; background: #111827; border: 2px dashed #9ca3af; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .pdf-btn:hover { background: #374151; }

    .main { flex: 1; padding: 20px; box-sizing: border-box; }
    iframe { width: 100%; height: 75vh; border: none; }

    .booking { margin-top: 20px; }
    .booking input, .booking textarea { width: 100%; padding: 8px; margin: 5px 0; }
    .booking button { padding: 10px; background: #2563eb; color: white; border: none; cursor: pointer; }

    .title { font-size: 22px; margin-bottom: 10px; font-weight: bold; }
  </style>
</head>
<body>

<script>
  const PASSWORD = "dekani";
  const saved = localStorage.getItem("auth_ok");

  function showApp() {
    document.getElementById("app").style.display = "block";
  }

  if (saved === "true") {
    showApp();
  } else {
    const pass = prompt("Vnesi geslo:");
    if (pass === PASSWORD) {
      localStorage.setItem("auth_ok", "true");
      showApp();
    } else {
      document.body.innerHTML = "<h2 style='padding:20px'>Dostop zavrnjen</h2>";
    }
  }

  function logout() {
    localStorage.removeItem("auth_ok");
    location.reload();
  }
</script>

<div id="app">
  <div class="container">

    <div class="sidebar">
      <div>
        <div class="header-title">KRAJEVNA SKUPNOST DEKANI</div>
        <h2>Prostori</h2>

        <div class="room" style="background:#3b82f6" onclick="changeCalendar('https://calendar.google.com/calendar/embed?src=ABC123')">VELIKA DVORANA</div>
        <div class="room" style="background:#10b981" onclick="changeCalendar('LINK2')">MALA DVORANA</div>
        <div class="room" style="background:#f59e0b" onclick="changeCalendar('LINK3')">STARA GARAŽA</div>
        <div class="room" style="background:#ef4444" onclick="changeCalendar('LINK4')">DOPOLAVOR</div>
        <div class="room" style="background:#8b5cf6" onclick="changeCalendar('LINK5')">KLOPI</div>
        <div class="room" style="background:#14b8a6" onclick="changeCalendar('LINK6')">OSTALO</div>
      </div>

      <div class="pdf-section">
        <div class="pdf-btn" onclick="openPDF()">📄 CENIK</div>
        <div class="pdf-btn" style="margin-top:10px;border-style:solid" onclick="logout()">🔒 ODJAVA</div>
      </div>
    </div>

    <div class="main">
      <div class="title">Razpoložljivost prostorov</div>

      <iframe id="calendarFrame" src="LINK1"></iframe>

      <div class="booking">
        <h3>Povpraševanje za rezervacijo</h3>
        <form action="mailto:your@email.com" method="post" enctype="text/plain">
          <input type="text" name="ime" placeholder="Ime" required>
          <input type="email" name="email" placeholder="Email" required>
          <textarea name="sporocilo" placeholder="Želeni termin in prostor" required></textarea>
          <button type="submit">Pošlji</button>
        </form>
      </div>
    </div>

  </div>
</div>

<script>
  function changeCalendar(link) {
    document.getElementById('calendarFrame').src = link;
  }

  function openPDF() {
    window.open('cenik.pdf', '_blank');
  }
</script>

</body>
</html>
